<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f8f8;
        }
        .header {
            background: linear-gradient(90deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            align-items: center;
            padding: 18px 32px 18px 18px;
            gap: 18px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .logo span {
            color: #3a77ff;
        }
        .logo .x {
            color: #f9b233;
        }
        .search-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            margin: 0 18px;
        }
        .search-bar input {
            border: none;
            outline: none;
            padding: 12px 16px;
            font-size: 1.1rem;
            flex: 1;
            border-radius: 8px 0 0 8px;
        }
        .search-bar .fa-camera {
            color: #3a77ff;
            font-size: 1.3rem;
            margin: 0 12px;
            cursor: pointer;
        }
        .header-btns {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .header-btns a {
            color: #222;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            margin-left: 8px;
        }
        .profile-btn {
            background: #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border: 2px solid #e0eafc;
            transition: box-shadow 0.2s;
        }
        .profile-btn:hover {
            box-shadow: 0 4px 16px rgba(58,119,255,0.13);
        }
        .main-menu {
            display: flex;
            justify-content: center;
            gap: 36px;
            background: #fff;
            padding: 18px 0 0 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .main-menu a {
            color: #222;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 6px 6px 0 0;
            transition: background 0.2s;
        }
        .main-menu a:hover {
            background: #e0eafc;
        }
        .categories {
            display: flex;
            justify-content: center;
            gap: 36px;
            margin: 36px 0 24px 0;
            flex-wrap: wrap;
        }
        .category {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            animation: popIn 0.7s cubic-bezier(.68,-0.55,.27,1.55) both;
        }
        .category i {
            font-size: 2.5rem;
            background: #fff;
            border-radius: 50%;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(58,119,255,0.07);
            margin-bottom: 6px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .category:hover i {
            transform: scale(1.13) rotate(-7deg);
            box-shadow: 0 4px 16px rgba(58,119,255,0.13);
        }
        .category span {
            font-size: 1rem;
            font-weight: 500;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .deals-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 48px;
            margin: 32px 0 0 0;
            flex-wrap: wrap;
        }
        .deal-card {
            background: #fff;
            border-radius: 50%;
            width: 340px;
            height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(58,119,255,0.07);
            position: relative;
            animation: fadeInUp 1s cubic-bezier(.68,-0.55,.27,1.55) both;
        }
        .deal-card img {
            width: 180px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 18px;
        }
        .deal-price {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: #f9b233;
            color: #fff;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 18px;
            font-size: 1.1rem;
            box-shadow: 0 2px 8px rgba(249,178,51,0.13);
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(60px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .deals-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 260px;
            margin: 0 18px;
        }
        .deals-center h2 {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 18px;
        }
        .deals-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 1.1rem;
            color: #555;
        }
        .deals-list span {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .deals-list i {
            color: #3a77ff;
        }
        @media (max-width: 1100px) {
            .deals-section {
                flex-direction: column;
                align-items: center;
            }
            .deal-card {
                margin-bottom: 24px;
            }
        }
        @media (max-width: 700px) {
            .header, .main-menu, .categories, .deals-section {
                flex-direction: column;
                align-items: stretch;
                gap: 18px;
            }
            .search-bar {
                margin: 12px 0;
            }
            .deal-card {
                width: 90vw;
                height: 90vw;
                min-width: 220px;
                min-height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>ol</span><span class="x">x</span></div>
        <div class="search-bar">
            <input type="text" placeholder="SEARCH">
            <i class="fa-solid fa-camera"></i>
        </div>
        <div class="header-btns">
            <a href="#">LOGIN</a>
            <a href="#">SIGN UP</a>
            <div class="profile-btn"><i class="fa-solid fa-user"></i></div>
        </div>
    </div>
    <div class="main-menu">
        <a href="#">My Orders</a>
        <a href="#">Sell</a>
        <a href="#">Customer Support</a>
        <a href="#">Wishlist</a>
        <a href="#">Offers</a>
    </div>
    <div class="categories">
        <div class="category" style="animation-delay:0.05s"><i class="fa-solid fa-laptop"></i><span>Electronics</span></div>
        <div class="category" style="animation-delay:0.1s"><i class="fa-solid fa-car"></i><span>Vehicles</span></div>
        <div class="category" style="animation-delay:0.15s"><i class="fa-solid fa-couch"></i><span>Furniture</span></div>
        <div class="category" style="animation-delay:0.2s"><i class="fa-solid fa-shirt"></i><span>Fashion</span></div>
        <div class="category" style="animation-delay:0.25s"><i class="fa-solid fa-seedling"></i><span>Home &amp; Garden</span></div>
        <div class="category" style="animation-delay:0.3s"><i class="fa-solid fa-futbol"></i><span>Sports</span></div>
        <div class="category" style="animation-delay:0.35s"><i class="fa-solid fa-briefcase"></i><span>Real Estate</span></div>
    </div>
    <div class="deals-section">
        <div class="deal-card" style="animation-delay:0.1s">
            <img src="https://cdn.pixabay.com/photo/2017/01/06/19/15/smartphone-1957740_1280.jpg" alt="Phone & Console">
            <div class="deal-price">Great Deal!<br>₹45,999</div>
        </div>
        <div class="deals-center">
            <h2>Popular Item Deals</h2>
            <div class="deals-list">
                <span><i class="fa-solid fa-coins"></i> ₹01dur - Calbbes</span>
                <span><i class="fa-solid fa-box"></i> Cradung - Viuale</span>
                <span><i class="fa-solid fa-store"></i> Destinieries - PAGG</span>
                <span><i class="fa-solid fa-image"></i> FhotA - Jobs</span>
                <span><i class="fa-solid fa-leaf"></i> Meet 'Nestal</span>
            </div>
        </div>
        <div class="deal-card" style="animation-delay:0.2s">
            <img src="https://cdn.pixabay.com/photo/2016/11/29/09/32/bed-1866581_1280.jpg" alt="Bed & Car">
            <div class="deal-price">Great Deal!<br>₹8,499</div>
        </div>
    </div>
</body>
</html>
