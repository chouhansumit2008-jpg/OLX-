<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: #002f34;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
        }

        .logo-text span {
            color: #23e5db;
        }

        .header-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin-left: auto;
            margin-right: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border: 2px solid #fff;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: #fff;
            color: #002f34;
        }

        /* Profile Container */
        .profile-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #23e5db;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            color: #002f34;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: #002f34;
            margin-bottom: 5px;
        }

        .profile-email {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            margin-bottom: 25px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #002f34;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .profile-menu {
            text-align: left;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            color: #333;
            text-decoration: none;
            transition: color 0.2s;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            color: #23e5db;
        }

        .menu-item i {
            width: 24px;
            font-size: 18px;
        }

        .menu-item span {
            flex: 1;
            font-size: 16px;
        }

        .menu-item .arrow {
            color: #999;
            font-size: 14px;
        }

        .logout-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #002f34;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #00484f;
        }

        /* Edit Profile Section */
        .edit-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .edit-title {
            font-size: 18px;
            font-weight: 600;
            color: #002f34;
            margin-bottom: 15px;
            text-align: left;
        }

        .edit-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: #23e5db;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: #23e5db;
            color: #002f34;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #1ac7c2;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="first.html" class="logo">
            <div class="logo-text">OL<span>X</span></div>
        </a>
        <div class="header-title">My Profile</div>
        <a href="first.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span>Home</span>
        </a>
    </header>

    <!-- Profile Container -->
    <div class="profile-container">
        <div class="profile-card">
            <!-- Avatar -->
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>

            <!-- Name & Email -->
            <div class="profile-name">Sumit Chouhan</div>
            <div class="profile-email">sumit.chouhan@email.com</div>

            <!-- Stats -->
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-number">5</div>
                    <div class="stat-label">Listings</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">12</div>
                    <div class="stat-label">Sold</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">8</div>
                    <div class="stat-label">Reviews</div>
                </div>
            </div>

            <!-- Menu -->
            <div class="profile-menu">
                <a href="#" class="menu-item">
                    <i class="fas fa-box"></i>
                    <span>My Listings</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-heart"></i>
                    <span>Saved Items</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-question-circle"></i>
                    <span>Help & Support</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
            </div>

            <!-- Logout Button -->
            <button class="logout-btn" onclick="window.location.href='login.html'">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <script>
        // Demo: Show user info from localStorage if available
        document.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('olx_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.querySelector('.profile-name').textContent = user.name || 'User';
                document.querySelector('.profile-email').textContent = user.email || 'user@email.com';
            }
        });
    </script>
</body>
</html>
