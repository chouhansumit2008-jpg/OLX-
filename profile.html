<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            color: #002f34;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .header {
            background: #002f34;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
        }

        .logo-text span {
            color: #23e5db;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            border: 2px solid #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .header-link:hover {
            background: #fff;
            color: #002f34;
        }

        .profile-container {
            max-width: 960px;
            margin: 34px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .profile-card,
        .edit-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(0, 47, 52, 0.08);
            padding: 28px;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #23e5db;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-bottom: 18px;
        }

        .profile-name {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .profile-email,
        .profile-phone,
        .status {
            color: #64787b;
        }

        .profile-phone {
            margin-top: 4px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 18px 0;
            border-top: 1px solid #edf1f2;
            border-bottom: 1px solid #edf1f2;
            margin: 22px 0;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 800;
        }

        .stat-label {
            color: #64787b;
            font-size: 14px;
            margin-top: 4px;
        }

        .profile-menu {
            display: grid;
            gap: 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f6f9f9;
            border-radius: 12px;
            color: #314648;
        }

        .menu-item i:first-child {
            width: 20px;
        }

        .menu-item .arrow {
            margin-left: auto;
            color: #92a3a5;
        }

        .logout-btn,
        .save-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .logout-btn {
            margin-top: 18px;
            background: #002f34;
            color: #fff;
        }

        .save-btn {
            background: #23e5db;
            color: #002f34;
        }

        .edit-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #d5dee0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #23e5db;
        }

        .status {
            min-height: 22px;
            margin-top: 12px;
        }

        @media (max-width: 860px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="first.html" class="logo-text">OL<span>X</span></a>
        <div class="header-actions">
            <a href="products.html" class="header-link"><i class="fas fa-store"></i><span>Products</span></a>
            <a href="second-page.html" class="header-link"><i class="fas fa-compass"></i><span>Discover</span></a>
            <a href="landing.html" class="header-link"><i class="fas fa-house"></i><span>Landing</span></a>
        </div>
    </header>

    <main class="profile-container">
        <section class="profile-card">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-name" id="profileName">OLX User</div>
            <div class="profile-email" id="profileEmail">user@example.com</div>
            <div class="profile-phone" id="profilePhone">+91 00000 00000</div>

            <div class="profile-stats">
                <div>
                    <div class="stat-number">5</div>
                    <div class="stat-label">Listings</div>
                </div>
                <div>
                    <div class="stat-number">12</div>
                    <div class="stat-label">Sold</div>
                </div>
                <div>
                    <div class="stat-number">8</div>
                    <div class="stat-label">Reviews</div>
                </div>
            </div>

            <div class="profile-menu">
                <a href="products.html" class="menu-item"><i class="fas fa-box"></i><span>My Listings</span><i class="fas fa-chevron-right arrow"></i></a>
                <a href="products.html" class="menu-item"><i class="fas fa-heart"></i><span>Saved Items</span><i class="fas fa-chevron-right arrow"></i></a>
                <a href="product-detail.html" class="menu-item"><i class="fas fa-mobile-screen-button"></i><span>Recent Product View</span><i class="fas fa-chevron-right arrow"></i></a>
                <a href="second-page.html" class="menu-item"><i class="fas fa-life-ring"></i><span>Help & Support</span><i class="fas fa-chevron-right arrow"></i></a>
            </div>

            <button class="logout-btn" type="button" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </section>

        <section class="edit-card">
            <div class="edit-title">Edit Profile</div>
            <form id="profileForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" inputmode="numeric" required>
                </div>

                <button type="submit" class="save-btn">Save Changes</button>
                <div class="status" id="status"></div>
            </form>
        </section>
    </main>

    <script>
        const fallbackUser = {
            name: "OLX User",
            email: "user@example.com",
            phone: "+91 00000 00000"
        };

        const status = document.getElementById("status");
        const form = document.getElementById("profileForm");
        const phoneInput = document.getElementById("phone");

        function loadUser() {
            const savedUser = JSON.parse(localStorage.getItem("olx_user") || "null") || fallbackUser;
            document.getElementById("profileName").textContent = savedUser.name || fallbackUser.name;
            document.getElementById("profileEmail").textContent = savedUser.email || fallbackUser.email;
            document.getElementById("profilePhone").textContent = savedUser.phone || fallbackUser.phone;
            document.getElementById("name").value = savedUser.name || "";
            document.getElementById("email").value = savedUser.email || "";
            document.getElementById("phone").value = savedUser.phone || "";
        }

        phoneInput.addEventListener("input", () => {
            phoneInput.value = phoneInput.value.replace(/[^\d+]/g, "");
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            const current = JSON.parse(localStorage.getItem("olx_user") || "{}");
            const updatedUser = {
                ...current,
                name: document.getElementById("name").value.trim(),
                email: document.getElementById("email").value.trim(),
                phone: document.getElementById("phone").value.trim()
            };

            localStorage.setItem("olx_user", JSON.stringify(updatedUser));
            loadUser();
            status.textContent = "Profile updated successfully.";
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("olx_user");
            window.location.href = "login.html";
        });

        loadUser();
    </script>
</body>
</html>
