<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(35, 229, 219, 0.2), transparent 24%),
                linear-gradient(180deg, #f7fbfb 0%, #fafafa 100%);
            padding: 20px;
        }

        .signup-container {
            width: min(100%, 440px);
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(0, 47, 52, 0.1);
            padding: 34px 30px;
        }

        .olx-logo {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-align: center;
        }

        .welcome {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #002f34;
        }

        .signup-title {
            text-align: center;
            font-size: 17px;
            color: #66797b;
            margin-bottom: 22px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #cad7da;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #23e5db;
        }

        .password-group {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 39px;
            border: none;
            background: none;
            cursor: pointer;
            color: #66797b;
        }

        .signup-btn {
            width: 100%;
            background: #23e5db;
            color: #002f34;
            border: none;
            padding: 13px 0;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }

        .signup-btn:hover {
            background: #1fcfc6;
        }

        .or {
            text-align: center;
            color: #7a8d90;
            margin: 18px 0 12px;
            font-size: 14px;
        }

        .social-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .social-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 0;
            border: 1px solid #d7e0e2;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .terms,
        .login-link,
        .status {
            text-align: center;
            font-size: 14px;
            color: #67797c;
        }

        .terms a,
        .login-link a {
            color: #3a77ff;
            text-decoration: none;
            font-weight: 600;
        }

        .status {
            min-height: 21px;
            margin-top: 14px;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <form class="signup-form" id="signupForm">
            <div class="olx-logo"><span style="color:#002f34">O</span><span style="color:#23e5db">L</span><span style="color:#f9b233">X</span></div>
            <div class="welcome">Create your account</div>
            <div class="signup-title">Sign up to save listings and manage your profile.</div>

            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" placeholder="Phone number" inputmode="numeric" required>
            </div>

            <div class="input-group password-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required>
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>

            <div class="or">OR</div>

            <div class="social-btns">
                <button type="button" class="social-btn" data-provider="Google"><i class="fab fa-google"></i>Google</button>
                <button type="button" class="social-btn" data-provider="Facebook"><i class="fab fa-facebook-f"></i>Facebook</button>
                <button type="button" class="social-btn" data-provider="Apple"><i class="fab fa-apple"></i>Apple</button>
            </div>

            <div class="terms">By signing up, you agree to our <a href="landing.html">Terms</a> and <a href="landing.html">Privacy</a>.</div>
            <div class="login-link" style="margin-top:10px;">Already have an account? <a href="login.html">Login</a></div>
            <div class="status" id="status"></div>
        </form>
    </div>

    <script>
        const signupForm = document.getElementById("signupForm");
        const passwordInput = document.getElementById("password");
        const phoneInput = document.getElementById("phone");
        const toggleButton = document.querySelector(".toggle-password");
        const status = document.getElementById("status");

        phoneInput.addEventListener("input", () => {
            phoneInput.value = phoneInput.value.replace(/\D/g, "");
        });

        toggleButton.addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            toggleButton.innerHTML = isPassword ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });

        signupForm.addEventListener("submit", (event) => {
            event.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const passwordValid = password.length >= 8 && !/\s/.test(password) && /[A-Za-z]/.test(password);

            if (!name || !email || !phone || !passwordValid) {
                status.textContent = "Complete every field and use a password with at least 8 characters and one letter.";
                return;
            }

            localStorage.setItem("olx_user", JSON.stringify({ name, email, phone, password }));
            status.textContent = "Account created successfully. Redirecting to your profile...";
            setTimeout(() => {
                window.location.href = "profile.html";
            }, 700);
        });

        document.querySelectorAll(".social-btn").forEach((button) => {
            button.addEventListener("click", () => {
                alert(button.dataset.provider + " signup is a demo action in this project.");
            });
        });
    </script>
</body>
</html>
