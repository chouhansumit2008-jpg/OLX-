<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(35, 229, 219, 0.2), transparent 24%),
                linear-gradient(180deg, #f7fbfb 0%, #fafafa 100%);
            padding: 20px;
        }

        .login-container {
            width: min(100%, 430px);
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(0, 47, 52, 0.1);
            padding: 34px 30px;
        }

        .olx-logo {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-align: center;
        }

        .welcome {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 22px;
            color: #002f34;
        }

        .tab-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            border-radius: 999px;
            font-weight: 700;
            background: #f1f5f5;
            color: #002f34;
        }

        .tab.active {
            background: #002f34;
            color: #fff;
        }

        .login-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #002f34;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #cad7da;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #23e5db;
        }

        .input-group.password {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 39px;
            border: none;
            background: none;
            cursor: pointer;
            color: #66797b;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .forgot-link,
        .signup-link a,
        .terms a {
            color: #3a77ff;
            text-decoration: none;
            font-weight: 600;
        }

        .login-btn {
            width: 100%;
            background: #23e5db;
            color: #002f34;
            border: none;
            padding: 13px 0;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #1fcfc6;
        }

        .or {
            text-align: center;
            color: #7a8d90;
            margin: 18px 0 12px;
            font-size: 14px;
        }

        .social-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .social-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 0;
            border: 1px solid #d7e0e2;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .terms,
        .signup-link,
        .status {
            text-align: center;
            font-size: 14px;
            color: #67797c;
        }

        .status {
            min-height: 21px;
            margin-top: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form class="login-form" id="loginForm">
            <div class="olx-logo"><span style="color:#002f34">O</span><span style="color:#23e5db">L</span><span style="color:#f9b233">X</span></div>
            <div class="welcome">Welcome back</div>

            <div class="tab-group">
                <span class="tab active">Login</span>
                <a href="signup.html" class="tab">Sign Up</a>
            </div>

            <div class="login-title">Continue with your account</div>

            <div class="input-group">
                <label for="email">Email or phone</label>
                <input type="text" id="email" placeholder="Enter email or phone" required>
            </div>

            <div class="input-group password">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="actions">
                <span></span>
                <a href="signup.html" class="forgot-link">Need an account?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="or">OR</div>

            <div class="social-btns">
                <button type="button" class="social-btn" data-provider="Google"><i class="fab fa-google"></i>Google</button>
                <button type="button" class="social-btn" data-provider="Facebook"><i class="fab fa-facebook-f"></i>Facebook</button>
                <button type="button" class="social-btn" data-provider="Apple"><i class="fab fa-apple"></i>Apple</button>
            </div>

            <div class="terms">By continuing, you agree to our <a href="landing.html">Terms</a> and <a href="landing.html">Privacy</a>.</div>
            <div class="signup-link" style="margin-top:10px;">New here? <a href="signup.html">Create an account</a></div>
            <div class="status" id="status"></div>
        </form>
    </div>

    <script>
        const toggleButton = document.querySelector(".toggle-password");
        const passwordInput = document.getElementById("password");
        const loginForm = document.getElementById("loginForm");
        const status = document.getElementById("status");

        toggleButton.addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            toggleButton.innerHTML = isPassword ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });

        loginForm.addEventListener("submit", (event) => {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = passwordInput.value;

            if (!email || password.length < 8) {
                status.textContent = "Enter a valid email or phone and a password with at least 8 characters.";
                return;
            }

            const savedUser = JSON.parse(localStorage.getItem("olx_user") || "{}");
            const name = savedUser.name || "OLX User";
            const user = {
                name,
                email,
                phone: savedUser.phone || "",
                password
            };

            localStorage.setItem("olx_user", JSON.stringify(user));
            status.textContent = "Login successful. Redirecting to profile...";
            setTimeout(() => {
                window.location.href = "profile.html";
            }, 700);
        });

        document.querySelectorAll(".social-btn").forEach((button) => {
            button.addEventListener("click", () => {
                alert(button.dataset.provider + " login is a demo action in this project.");
            });
        });

        const savedUser = JSON.parse(localStorage.getItem("olx_user") || "{}");
        if (savedUser.email) {
            document.getElementById("email").value = savedUser.email;
        }
    </script>
</body>
</html>
