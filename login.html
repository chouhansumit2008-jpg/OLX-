<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            width: 100%;
        }
        .login-form {
            flex: 1;
            min-width: 320px;
        }
        .olx-logo {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 8px;
            text-align: center;
        }
        .welcome {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 18px;
        }
        .tab-group {
            display: flex;
            margin-bottom: 18px;
        }
        .tab {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: #f5f5f5;
            color: #333;
            font-size: 16px;
            font-weight: 600;
            border-radius: 20px 20px 0 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .tab.active {
            background: #cbb89d;
            color: #fff;
        }
        .login-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #cbb89d;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #6c3eb6;
        }
        .input-group.password {
            position: relative;
        }
        .input-group .toggle-password {
            position: absolute;
            right: -15px;
            top: 70%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            font-size: 16px;
            padding: 0;
            height: 14px;
            display: flex;
            align-items: center;
        }
        .forgot-link {
            float: right;
            font-size: 13px;
            color: #6c3eb6;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .login-btn {
            width: 100%;
            background: #cbb89d;
            color: #fff;
            border: none;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #b09a7d;
        }
        .or {
            text-align: center;
            color: #888;
            margin: 16px 0 12px 0;
            font-size: 14px;
        }
        .social-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 0;
            border: 1.5px solid #cbb89d;
            border-radius: 6px;
            background: #fff;
            color: #333;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .social-btn.facebook {
            background: #cbb89d;
            color: #fff;
        }
        .social-btn.google i { color: #ea4335; }
        .social-btn.facebook i { color: #fff; }
        .social-btn.apple i { color: #333; }
        .terms {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
        }
        .terms a {
            color: #6c3eb6;
            text-decoration: underline;
        }
        .signup-link {
            text-align: center;
            font-size: 15px;
            margin-top: 8px;
        }
        .signup-link a {
            color: #6c3eb6;
            text-decoration: underline;
            font-weight: 600;
        }
        .side-image {
            flex: 1;
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .side-image .cart-img {
            width: 90%;
            max-width: 260px;
            filter: grayscale(0.3) brightness(0.97);
        }
        @media (max-width: 900px) {
            .login-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 32px 10px;
            }
            .side-image {
                min-width: 0;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <div class="olx-logo"><span style="color:#002f34">O</span><span style="color:#23e5db">L</span><span style="color:#f9b233">X</span></div>
            <div class="welcome">Welcome back!</div>
            <div class="tab-group">
                <button type="button" class="tab active">Login</button>
                <button type="button" class="tab">Sign Up</button>
            </div>
            <div class="login-title">Login <span style="font-weight:400">to continue where you left off</span></div>
            <div class="input-group">
                <label for="email">Email or Phone</label>
                <input type="text" id="email" placeholder="Email or Phone" required>
            </div>
            <div class="input-group password">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" class="toggle-password" tabindex="-1"><i class="fas fa-eye"></i></button>
            </div>
            <a href="#" class="forgot-link">Forgot password?</a>
            <button type="submit" class="login-btn">Login</button>
            <div class="or">OR</div>
            <div class="social-btns">
                <button type="button" class="social-btn google"><i class="fab fa-google"></i>Google</button>
                <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f"></i>Facebook</button>
                <button type="button" class="social-btn apple"><i class="fab fa-apple"></i>Apple</button>
            </div>
            <div class="terms">By continuing, you agree to our <a href="#">Terms &amp; conditions</a> | <a href="#">Privacy</a></div>
            <div class="signup-link">New here? <a href="signup.html">Sign up</a></div>
        </form>

    </div>
    <script>
        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.innerHTML = '<i class="fas fa-eye-slash"></i>';
                } else {
                    input.type = 'password';
                    this.innerHTML = '<i class="fas fa-eye"></i>';
                }
            });
        });

        // Sign Up tab button redirects to signup page
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                if (this.textContent.trim() === 'Sign Up') {
                    window.location.href = 'signup.html';
                }
            });
        });

        // Social login buttons - show alert (requires backend OAuth setup for real functionality)
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const provider = this.classList.contains('google') ? 'Google' : 
                                 this.classList.contains('facebook') ? 'Facebook' : 'Apple';
                alert(provider + ' login requires OAuth backend integration. This is a demo button.');
            });
        });
    </script>
</body>
</html>
